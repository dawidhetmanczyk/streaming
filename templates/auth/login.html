{% extends "base.html" %}

{% block title %}Logowanie — StreamFlix{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="section-title">Logowanie</h1>
    <form method="post" class="panel-box">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors|striptags }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-danger w-100">Zaloguj</button>
    </form>
    <p class="mt-3 text-secondary">Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a></p>
  </div>
</div>
{% endblock %}
