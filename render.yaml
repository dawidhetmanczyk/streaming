services:
  - type: web
    name: streaming-platform
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn streaming_platform.wsgi:application
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: streaming-platform-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

databases:
  - name: streaming-platform-db
    plan: free
